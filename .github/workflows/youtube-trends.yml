name: Actualização Semanal — Reportagem Viva

on:
  schedule:
    - cron: '0 6 * * 1'   # Segundas-feiras, 06:00 UTC (07:00 Lisboa)
  workflow_dispatch:        # Permite correr manualmente no GitHub

env:
  SUPABASE_URL: https://ijpxjpbjudaddfatibfl.supabase.co
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqcHhqcGJqdWRhZGRmYXRpYmZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzEzODUsImV4cCI6MjA4ODU0NzM4NX0.SfOLBTYyIhk-CxzvtlvFu1E-GqBNXN3CbFqz8qx-BoM

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      # ── PASSO 0: Ping Supabase para evitar pausa por inactividade ──────
      - name: 0 — Ping Supabase (wake up)
        run: |
          echo "A verificar se a instância Supabase está activa..."
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ijpxjpbjudaddfatibfl.supabase.co/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "Health check HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::Supabase health check devolveu HTTP $CODE — a instância pode estar a arrancar"
            echo "A aguardar 30s para a instância acordar..."
            sleep 30
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: pip install "pytrends==4.9.2" "urllib3<2.0" google-api-python-client requests --quiet

      # ── PASSO 1: Google Trends reais → volumes das keywords ──────────────
      - name: 1 — Google Trends PT (volumes reais)
        run: |
          echo "A buscar volumes reais do Google Trends PT..."
          python scripts/5_fetch_google_trends.py

      # ── PASSO 2: Perguntas de saúde em crescimento ────────────────────────
      - name: 2 — Perguntas de saúde em crescimento
        run: |
          echo "A buscar perguntas reais em crescimento..."
          python scripts/6_fetch_health_questions.py
          
      # ── PASSO 2B: Perguntas via Google Autocomplete ───────────────────────
      - name: 2B — Perguntas de saúde (autocomplete)
        run: |
          echo "A buscar perguntas via Google Autocomplete..."
          python scripts/7_fetch_autocomplete_questions.py

      # ── PASSO 3: Refresh trends → snapshots históricos ───────────────────
      - name: 3 — Refresh trends (snapshots históricos)
        run: |
          echo "A invocar refresh-trends..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/refresh-trends" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE — $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::warning::refresh-trends devolveu HTTP $CODE"
          fi

      # ── PASSO 4: RSS feeds → notícias ────────────────────────────────────
      - name: 4 — Fetch RSS feeds (notícias)
        run: |
          echo "A invocar fetch-rss-feeds..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/fetch-rss-feeds" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE — $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::warning::fetch-rss-feeds devolveu HTTP $CODE"
          fi

      # ── PASSO 4B: Limpeza semanal de notícias antigas ────────────────────
      - name: 4B — Limpeza notícias antigas
        run: |
          echo "A limpar notícias antigas por eixo..."
          python scripts/9_cleanup_old_news.py

      # ── PASSO 5: YouTube trends ───────────────────────────────────────────
      - name: 5 — YouTube trends
        run: |
          python scripts/4_fetch_youtube_trends.py ${{ secrets.YOUTUBE_API_KEY }}

      # ── PASSO 6: Guiões semanais (4 eixos) ──────────────────────────────
      - name: 6 — Guiões semanais
        run: |
          echo "A gerar guiões da semana..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/generate-guioes-weekly" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE — $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::warning::generate-guioes-weekly devolveu HTTP $CODE"
          fi

      # ── PASSO 7: Arquivo semanal (dashboard + briefing) ─────────────────
      - name: 7 — Arquivo semanal
        run: |
          echo "A arquivar dados da semana anterior..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/archive-weekly" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE — $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::warning::archive-weekly devolveu HTTP $CODE"
          fi

      - name: Resumo
        run: |
          echo "Actualização semanal concluída — $(date '+%d/%m/%Y %H:%M UTC')"
