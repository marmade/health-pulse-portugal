name: Actualizar YouTube Trends

on:
  schedule:
      - cron: '0 6 * * 1'
        workflow_dispatch:

        jobs:
          fetch-youtube:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v3
                              - uses: actions/setup-python@v4
                                      with:
                                                python-version: '3.11'
                                                      - run: pip install google-api-python-client requests
                                                            - run: python scripts/4_fetch_youtube_trends.py ${{ secrets.YOUTUBE_API_KEY }}
